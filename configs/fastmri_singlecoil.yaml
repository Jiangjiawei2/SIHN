experiment:
  name: fastmri_singlecoil_sihn
  seed: 2024
  output_dir: outputs/fastmri_sihn
data:
  dataset: fastmri
  root: data/fastmri
  challenge: singlecoil
  train_split: train
  val_split: val
  test_split: test
  target_key: reconstruction_esc
  image_size: [320, 320]
mask:
  type: random
  acceleration: 4
  center_fraction: 0.08
  seed: 2024
model:
  in_channels: 2
  out_channels: 2
  base_channels: 32
  stages: 5
  semantic_nodes: 64
  rho: 0.5
  eta: 0.1
train:
  epochs: 300
  batch_size: 4
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.0
  optimizer: adam
  betas: [0.9, 0.999]
  loss: charbonnier
  precision: 32-true
  log_every_n_steps: 20
eval:
  metrics: [psnr, ssim]
